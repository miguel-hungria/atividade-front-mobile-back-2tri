<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Atividade 17 </title>
  <style>
    body { font-family: sans-serif; margin: 40px; }
    .erro { color: red; font-weight: bold; display: none; }
    .sucesso { color: green; font-weight: bold; }
    button { margin-right: 5px; cursor: pointer; }
    li { margin-top: 5px; }
  </style>
</head>
<body>

  <h1>Envio de Dados</h1>
  
  <input type="text" id="campoTexto" placeholder="Digite o nome, tarefa ou aviso...">
  <br><br>

  <button onclick="enviarDado('Usuário')">Enviar Usuário</button>
  <button onclick="enviarDado('Tarefa')">Enviar Tarefa</button>
  <button onclick="enviarDado('Aviso')">Enviar Aviso</button>

  <p id="mensagemSucesso" class="sucesso"></p>
  <p id="mensagemErro" class="erro">Aviso: O servidor não respondeu (Offline)!</p>

  <hr>

  <h2>Avisos Recebidos (GET)</h2>
  <button onclick="atualizarLista()">Atualizar Lista</button>
  <ul id="lista"></ul>

  <script>
    const url = 'http://localhost:3000';


    async function enviarDado(tipoDoDado) {
      const input = document.getElementById('campoTexto');
      const msgSucesso = document.getElementById('mensagemSucesso');
      const msgErro = document.getElementById('mensagemErro');

    
      msgErro.style.display = 'none';
      msgSucesso.textContent = '';

      try {
        const resposta = await fetch(`${url}/enviar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tipo: tipoDoDado, conteudo: input.value })
        });
        
        const dados = await resposta.json();
        msgSucesso.textContent = dados.mensagem;
        input.value = ''; 
        atualizarLista(); 
      } catch (erro) {
        msgErro.style.display = 'block'; 
      }
    }


    async function atualizarLista() {
      const msgErro = document.getElementById('mensagemErro');
      const lista = document.getElementById('lista');
      msgErro.style.display = 'none';

      try {
        const resposta = await fetch(`${url}/avisos`);
        const dados = await resposta.json();
        
        lista.innerHTML = ''; 
        dados.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item.titulo;
          lista.appendChild(li);
        });
      } catch (erro) {
        msgErro.style.display = 'block';
      }
    }

    atualizarLista();
  </script>
</body>
</html>
