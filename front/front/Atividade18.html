<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 18</title>
</head>

<body>
    <h1>Login de Usuario</h1>

    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <button id="entrar">Entrar</button>

    <p id="resultado"></p>

    <script>
        document.querySelector('#entrar').addEventListener('click', async () => {
            const email = document.querySelector('#email').value;
            const senha = document.querySelector('#senha').value;

            try {
                const resposta = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    document.querySelector('#resultado').textContent = dados.mensagem;
                    return;
                }

                localStorage.setItem('token', dados.token);
                document.querySelector('#resultado').textContent = `Bem-vindo, usuário: ${dados.perfil}`;
            } catch (erro) {
                document.querySelector('#resultado').textContent = 'Erro ao conectar com o servidor.';
            }
        });
    </script>
</body>

</html>
