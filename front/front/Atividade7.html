<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style7.css">
    <title>Atividade 7</title>
</head>

<body>
    <h1> 2. Lista de tarefas</h1>

    <input type="text" id="aviso" placeholder="Digite a tarefa">
    <button id="botao">Adicionar</button>

    <ul id="lista"></ul>

    <script>
        const campoAviso = document.querySelector('#aviso');
        const botao = document.querySelector('#botao');
        const lista = document.querySelector('#lista');

        botao.addEventListener('click', () => {
            const texto = campoAviso.value.trim();

            if (texto === '') {
                alert('Digite um aviso antes de adicionar.');
                return;
            }

            const item = document.createElement('li');
            item.textContent = texto;
            lista.appendChild(item);

            campoAviso.value = '';
            campoAviso.focus();
        });
    </script>

    <hr>
